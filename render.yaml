services:
  - type: static
    name: portfolio-frontend
    buildCommand: cd Frontend && npm install && npm run build
    publishDir: Frontend/dist
    staticPublishPath: Frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
